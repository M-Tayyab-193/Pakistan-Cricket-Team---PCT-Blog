<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/icon.ico" type="image/x-icon">
    <title>PCT - Contact Us</title>
</head>
<style>
    .bg {
        background-image: url('/images/bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        background-color: rgba(0, 0, 0, 0.4);
        background-blend-mode: overlay;
        margin: 0px;
        padding: 0px;
        position: relative;
    }

    .header {
        display: flex;
        justify-content: space-between;
        width: 100%;
        height: 60px;
        box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.5);

    }

    .header img {
        width: 67px;
        height: 55px;
        padding-left: 10px;
        margin-top: 2px;
        cursor: pointer;
    }

    .nav {
        display: flex;
        justify-content: space-between;
        list-style: none;
        margin-top: 20px;
        margin-right: 40px;
    }

    .nav li {

        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        margin: 2px 0px;

    }

    .nav li a {
        text-decoration: none;
        color: rgb(255, 255, 255);
        font-size: 20px;
        padding: 10px;
        margin: 10px;
        transition: color 0.3s ease;
    }

    .nav li a:hover {
        color: rgb(146, 225, 28);
        border-bottom: 3px solid rgb(146, 225, 28);

    }

    .nav a.active {
        color: rgb(146, 225, 28);
        border-bottom: 3px solid rgb(146, 225, 28);
    }

    .footer {
        position: absolute;
        bottom: 0;
        text-align: center;
        box-shadow: 1px 1px 15px rgba(0, 0, 0, 1);
        width: 100%;
        color: white;
        font-family: "Poppins", serif;
        font-weight: 700;
        font-size: 17px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: transparent;
    }
    main{
        font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
    }
    
    .contact_us-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 40%;
        }

        .contact_us-box h2 {
            margin-bottom: 10px;
        }

        .contact_us-box input[type="email"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
        }
        .contact_us-box input[type="name"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
        }
        .contact_us-box textarea{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
        }
        .contact_us-box button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .contact_us-box button:hover {
            background: #218838;
        }
</style>

<body class="bg">
    <header>
        <div class="header">
            <img src="/images/logo.png" alt="">
            <nav>
                <ul class="nav">
                    <li><a href="/Home.html" target="_blank">Home</a></li>
                    <li><a href="LatestNews.Html" target="_blank">Latest News</a></li>
                    <li><a href="Moments.html" target="_blank">Memorable Moments</a></li>
                    <li><a href="/Contact.html" class="active">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="contact_us-box">
            <h2>Contact Us</h2>
            <p>We value your feedback! 📝 Share your thoughts and help us improve your experience. Your input makes a difference—fill out the form now! 🚀</p>
            <form>
                    <input type="name" placeholder="Enter your name" required>
                    <input type="email" placeholder="Enter your email" required>
                    <label for="feedback" style="text-align: left;">Your Message:</label><br>
                    <textarea id="feedback" name="feedback" rows="4" cols="30" placeholder="Write your feedback here..."></textarea>
                
                
                <div style="text-align: left; margin-bottom: 20px;">
                    <label>
                        <input type="checkbox" name="Terms_and_conds" value="Terms and Conds" required> I have read and accept the terms and conditions 
                    </label>
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
    </main>
    <footer class="footer">
        <p>&copy; 2025 Pakistan Cricket Team. All Rights Reserved.</p>
    </footer>
</body>

</html>
